name: Publish package to npm

# Only starts when a new release is created
on:
  release:
    types: [published]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    
    # Permissions to generate the "Provenance" security seal.
    permissions:
      contents: read
      id-token: write 

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ⚙️ Setting up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Publish on npm
        run: npm publish --provenance --access public
